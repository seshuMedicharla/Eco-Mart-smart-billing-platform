spring.application.name=${APP_NAME:EcoWaste Smart Billing System}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/eco_waste}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
app.product-images.dir=${PRODUCT_IMAGES_DIR:uploads/product-images}
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}
# Gmail OTP setup:
# 1. Enable 2-Step Verification in your Google account
# 2. Generate a Gmail App Password
# 3. Replace the placeholder values below
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:yourgmail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_16_digit_app_password}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}
app.otp.email.enabled=${OTP_EMAIL_ENABLED:true}
app.otp.email.from=${OTP_EMAIL_FROM:${MAIL_USERNAME:yourgmail@gmail.com}}
app.msg91.enabled=${MSG91_ENABLED:true}
app.msg91.widget-id=${MSG91_WIDGET_ID:36634568676c333133373332}
app.msg91.token-auth=${MSG91_TOKEN_AUTH:504731TnQpiyK4dhes69cb81d9P1}
app.msg91.authkey=${MSG91_AUTHKEY:504731AmedM7oDvQ1s69cb8e81P1}
app.msg91.country-code=${MSG91_COUNTRY_CODE:91}
app.msg91.otp-valid-minutes=${MSG91_OTP_VALID_MINUTES:5}
